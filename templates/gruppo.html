<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Drondroloni Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style_gruppo.css') }}">
</head>
<body class="gruppo-body">
  <div class="muro-texture"></div>
  <div class="page-wrapper" style="position:relative; z-index:1; padding:1rem 0.8rem 2rem;">

    <!-- HEADER -->
    <div class="gruppo-header">
      <div class="gruppo-logo-wrap">
        <img src="{{ url_for('static', filename='dondroloni.png') }}" alt="Drondroloni">
      </div>
      <div>
        <div class="graffiti-title">
          <span class="graffiti-title-inner">DRONDROLONI</span>
          <span class="graffiti-sub">// quiz del gruppo</span>
        </div>
      </div>
      <div style="margin-left:auto; display:flex; gap:7px;">
        <a href="/classifica" style="text-decoration:none;">
          <div style="padding:6px 10px; border:1px solid rgba(139,26,42,0.35); border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; color:var(--mu); text-transform:uppercase;">🏆 Classifica</div>
        </a>
        <a href="/" style="text-decoration:none;">
          <div style="padding:6px 10px; border:1px solid rgba(255,255,255,0.06); border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:2px; color:#2a1a1e; text-transform:uppercase;">← Home</div>
        </a>
      </div>
    </div>

    <!-- CARD -->
    <div class="card gruppo-card">
      <form action="/start-gruppo" method="post">
        <input type="hidden" name="viste" id="viste-input" value="">
        <input type="hidden" name="livello" id="livello-hidden" value="medio">
        <input type="hidden" name="n_domande" id="ndq-hidden" value="10">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
          <!-- Nome -->
          <div>
            <span class="g-label amber" style="font-size:11px; letter-spacing:2px;">🦍 // il tuo nome</span>
            <input type="text" name="nome" placeholder="Come ti chiami?" maxlength="20" autocomplete="off"
              style="width:100%; background:rgba(0,0,0,0.5); border:1px solid rgba(139,26,42,0.3); border-left:3px solid var(--gi); border-radius:10px; color:var(--cr); font-family:'Barlow',sans-serif; font-size:0.95rem; padding:0.75rem 1rem; outline:none;">
          </div>
          <!-- 15 ANNI -->
          <div>
            <span class="g-label" style="font-size:11px; letter-spacing:2px;">⏱ // insieme da</span>
            <div class="anni-box">
              <div class="anni-num">15</div>
              <div class="anni-label">anni<br>di<br>chat 🦍</div>
            </div>
          </div>
        </div>

        <!-- Difficoltà -->
        <div style="margin-bottom:10px;">
          <span class="g-label red" style="font-size:11px; letter-spacing:2px;">🔥 // difficoltà</span>
          <div class="diff-toggle">
            <button type="button" class="diff-btn active-medio" id="btn-medio" onclick="setDiff('medio')">📗 MEDIO</button>
            <button type="button" class="diff-btn" id="btn-difficile" onclick="setDiff('difficile')">📕 DIFFICILE</button>
          </div>
        </div>

        <!-- N. domande -->
        <div style="margin-bottom:12px;">
          <span class="g-label cyan" style="font-size:11px; letter-spacing:2px;">🎯 // numero domande</span>
          <div class="ndq-toggle">
            <button type="button" class="ndq-btn" onclick="setNdq(5,this)">5</button>
            <button type="button" class="ndq-btn active" onclick="setNdq(10,this)">10</button>
            <button type="button" class="ndq-btn" onclick="setNdq(15,this)">15</button>
            <button type="button" class="ndq-btn" onclick="setNdq(20,this)">20</button>
          </div>
        </div>

        <!-- Mini stats -->
        <div class="mini-stats" style="margin-bottom:14px;">
          <div class="mini-stat"><span class="mini-stat-num">150</span><span class="mini-stat-label">🗂 Domande</span></div>
          <div class="mini-stat"><span class="mini-stat-num">12</span><span class="mini-stat-label">🦍 Leggende</span></div>
          <div class="mini-stat"><span class="mini-stat-num">8+</span><span class="mini-stat-label">📸 Foto</span></div>
        </div>

        <button type="submit" class="btn-gruppo">🎮 INIZIA IL QUIZ</button>
      </form>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:6px;">
        <a href="/classifica" style="text-decoration:none;"><button class="btn-gruppo-secondary">🏆 Classifica</button></a>
        <a href="/" style="text-decoration:none;"><button class="btn-gruppo-secondary">🏠 Home</button></a>
      </div>

      <div style="margin-top:12px; display:flex; gap:16px; justify-content:center;">
        <div class="graffiti-tag" style="color:rgba(240,192,16,0.45); transform:rotate(-2deg); font-size:13px;">Eia! 🍷</div>
        <div class="graffiti-tag" style="color:rgba(192,40,60,0.40); transform:rotate(1deg); font-size:13px;">Io sono leggenda!!!</div>
        <div class="graffiti-tag" style="color:rgba(240,192,16,0.35); transform:rotate(-1deg); font-size:13px;">Cimbanella vaffanculo</div>
      </div>
    </div>

    <footer class="app-footer" style="margin-top:1rem;">// Drondroloni · dal 2010 con furore · 🦍</footer>
  </div>

  <script>
    function setDiff(val) {
      document.getElementById('livello-hidden').value = val;
      document.getElementById('btn-medio').className = 'diff-btn' + (val==='medio' ? ' active-medio' : '');
      document.getElementById('btn-difficile').className = 'diff-btn' + (val==='difficile' ? ' active-difficile' : '');
      aggiornaViste();
    }
    function setNdq(val, btn) {
      document.getElementById('ndq-hidden').value = val;
      document.querySelectorAll('.ndq-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    function aggiornaViste() {
      const liv = document.getElementById('livello-hidden').value;
      const viste = JSON.parse(localStorage.getItem('viste_gruppo_' + liv) || '[]');
      document.getElementById('viste-input').value = viste.join('||');
    }
    aggiornaViste();
  </script>
</body>
</html>
